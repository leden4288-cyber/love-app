<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Love Widget Final</title>
    <script src="https://telegram.org"></script>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --accent: #ff4d6d; --bg: #0f0c29; }
        body { margin: 0; font-family: 'Montserrat', sans-serif; background: var(--bg); color: white; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        /* Фон */
        .bg-gradient { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(45deg, #24243e, #302b63, #ff4d6d); background-size: 400% 400%; animation: move 10s infinite; z-index: -1; }
        @keyframes move { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }

        .container { width: 90%; padding: 20px; text-align: center; }
        
        /* Аватарки */
        .couple { display: flex; justify-content: center; align-items: center; gap: 15px; margin: 20px 0; }
        .avatar { width: 85px; height: 85px; border-radius: 50%; border: 3px solid #fff; background: rgba(255,255,255,0.1); background-size: cover; background-position: center; cursor: pointer; position: relative; }
        .avatar::after { content: '📸'; position: absolute; bottom: 0; right: 0; background: #fff; border-radius: 50%; padding: 3px; font-size: 10px; }
        .heart { font-size: 25px; animation: beat 1s infinite; }
        @keyframes beat { 0%, 100% {transform: scale(1);} 50% {transform: scale(1.2);} }

        /* Главная карточка */
        .card { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border-radius: 30px; padding: 30px 10px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.1); }
        .days { font-size: 70px; font-weight: 900; margin: 0; }

        /* Список этапов */
        .events { width: 100%; text-align: left; }
        .event-card { background: rgba(255,255,255,0.08); border-radius: 15px; padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .event-card.past { opacity: 0.5; }
        .event-info b { display: block; font-size: 14px; }
        .event-info span { font-size: 12px; color: #ccc; }
        .days-left { color: #ffeb3b; font-weight: 700; font-size: 14px; }

        /* Настройки */
        #panel { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; color: #000; transform: translateY(100%); transition: 0.4s; z-index: 1000; padding: 25px; box-sizing: border-box; overflow-y: auto; }
        #panel.active { transform: translateY(0); }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; }
        .btn { background: var(--accent); color: #fff; padding: 15px; border: none; border-radius: 12px; width: 100%; font-weight: 700; cursor: pointer; margin-top: 10px; }
        
        input[type="file"] { display: none; }
    </style>
</head>
<body>
    <div class="bg-gradient"></div>
    <div class="container">
        <div class="couple">
            <div id="p1" class="avatar" onclick="openFile('f1')"></div>
            <div class="heart">❤️</div>
            <div id="p2" class="avatar" onclick="openFile('f2')"></div>
        </div>

        <div class="card">
            <div id="pairNames" style="text-transform: uppercase; letter-spacing: 1px; font-size: 14px; opacity: 0.8;">МЫ ВМЕСТЕ</div>
            <div class="days" id="mainCount">0</div>
            <div style="font-size: 14px;">дней</div>
        </div>

        <div class="events" id="eventList"></div>

        <button class="btn" onclick="toggleSet(true)" style="background: rgba(255,255,255,0.1); border: 1px solid #fff;">Настроить ✨</button>
    </div>

    <!-- Панель настроек -->
    <div id="panel">
        <h3>Настройки</h3>
        <input type="text" id="in1" placeholder="Ваше имя">
        <input type="text" id="in2" placeholder="Имя половинки">
        <label>Дата начала:</label>
        <input type="date" id="inDate">
        
        <div style="background: #f9f9f9; padding: 15px; border-radius: 15px; margin-top: 10px;">
            <b>Добавить свою дату:</b>
            <input type="text" id="custName" placeholder="Название (напр. День Рождения)">
            <input type="date" id="custDate">
            <button class="btn" onclick="addCust()" style="background: #4caf50;">Добавить дату</button>
        </div>

        <button class="btn" onclick="save()">Сохранить всё</button>
        <button onclick="toggleSet(false)" style="width: 100%; border: none; background: none; margin-top: 15px; color: #999;">Закрыть</button>
    </div>

    <input type="file" id="f1" accept="image/*" onchange="loadImg(this, 'pic1')">
    <input type="file" id="f2" accept="image/*" onchange="loadImg(this, 'pic2')">

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let state = JSON.parse(localStorage.getItem('love_v5')) || {
            n1: 'Ты', n2: 'Половинка', date: '2024-01-01',
            pic1: '', pic2: '', custom: []
        };

        function openFile(id) { document.getElementById(id).click(); }
        function toggleSet(show) { document.getElementById('panel').classList.toggle('active', show); }

        function loadImg(input, key) {
            const reader = new FileReader();
            reader.onload = (e) => {
                state[key] = e.target.result;
                saveToLoc();
            };
            reader.readAsDataURL(input.files[0]);
        }

        function addCust() {
            const name = document.getElementById('custName').value;
            const date = document.getElementById('custDate').value;
            if(name && date) {
                state.custom.push({name, date});
                saveToLoc();
            }
        }

        function save() {
            state.n1 = document.getElementById('in1').value || state.n1;
            state.n2 = document.getElementById('in2').value || state.n2;
            state.date = document.getElementById('inDate').value || state.date;
            saveToLoc();
            toggleSet(false);
        }

        function saveToLoc() {
            localStorage.setItem('love_v5', JSON.stringify(state));
            render();
        }

        function render() {
            document.getElementById('pairNames').innerText = `${state.n1} + ${state.n2}`;
            const start = new Date(state.date);
            const today = new Date();
            const diff = Math.floor((today - start) / 86400000);
            document.getElementById('mainCount').innerText = diff > 0 ? diff : 0;

            if(state.pic1) document.getElementById('p1').style.backgroundImage = `url(${state.pic1})`;
            if(state.pic2) document.getElementById('p2').style.backgroundImage = `url(${state.pic2})`;

            const list = document.getElementById('eventList');
            list.innerHTML = '<h3 style="margin: 20px 0 10px;">Этапы любви</h3>';

            // Автоматические этапы: 1 мес, 3 мес, 6 мес, 1 год
            const milestones = [
                {t: "1 месяц", m: 1}, {t: "3 месяца", m: 3}, {t: "Полгода", m: 6}, {t: "1 год", m: 12}
            ];

            milestones.forEach(m => {
                let d = new Date(start);
                d.setMonth(d.getMonth() + m.m);
                const left = Math.ceil((d - today) / 86400000);
                drawItem(m.t, left);
            });

            if(state.custom.length > 0) {
                list.innerHTML += '<h3 style="margin: 20px 0 10px;">Ваши события</h3>';
                state.custom.forEach(c => {
                    const left = Math.ceil((new Date(c.date) - today) / 86400000);
                    drawItem(c.name, left);
                });
            }
        }

        function drawItem(name, left) {
            const isPast = left <= 0;
            const html = `
                <div class="event-card ${isPast ? 'past' : ''}">
                    <div class="event-info"><b>${name}</b></div>
                    <div class="days-left">${isPast ? 'Пройдено ✅' : 'Через ' + left + ' дн.'}</div>
                </div>`;
            document.getElementById('eventList').innerHTML += html;
        }

        render();
    </script>
</body>
