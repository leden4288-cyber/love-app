<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Love Premium</title>
    <script src="https://telegram.org"></script>
    <style>
        body { margin: 0; font-family: sans-serif; background: #4a0e0e; color: white; text-align: center; transition: 0.3s; }
        #bg-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: linear-gradient(45deg, #ff4e50, #f9d423, #ff006e, #8338ec); background-size: 400% 400%; animation: moveBG 15s infinite; }
        @keyframes moveBG { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }
        
        .container { width: 90%; max-width: 400px; margin: 0 auto; padding: 50px 0; }
        .gear-btn { position: fixed; top: 20px; left: 20px; width: 40px; height: 40px; background: rgba(255,255,255,0.2); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 100; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        
        .avatar-row { display: flex; justify-content: center; align-items: center; gap: 15px; margin-bottom: 25px; }
        .avatar { width: 85px; height: 85px; border-radius: 50%; border: 3px solid #fff; background-size: cover; background-position: center; background-color: rgba(255,255,255,0.1); box-shadow: 0 8px 20px rgba(0,0,0,0.3); }
        
        .glass-card { background: rgba(255,255,255,0.15); backdrop-filter: blur(15px); border-radius: 25px; padding: 30px; border: 1px solid rgba(255,255,255,0.2); box-shadow: 0 10px 30px rgba(0,0,0,0.3); margin-bottom: 20px; }
        .days-big { font-size: 70px; font-weight: bold; margin: 10px 0; }
        
        .event-box { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border-radius: 18px; padding: 15px 20px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .event-box.passed { opacity: 0.4; }

        /* Настройки Меню */
        #menu-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; color: black; display: none; z-index: 2000; padding: 20px; box-sizing: border-box; overflow-y: auto; text-align: left; }
        .sub-section { display: none; }
        .sub-section.active { display: block; }
        .menu-row { background: #f0f0f0; padding: 18px; border-radius: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; font-weight: bold; cursor: pointer; border: none; width: 100%; }
        
        input, select { width: 100%; padding: 12px; margin: 8px 0 15px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
        .save-btn { background: #ff4d6d; color: white; border: none; padding: 15px; border-radius: 12px; width: 100%; font-weight: bold; font-size: 16px; margin-top: 10px; }
    </style>
</head>
<body>

<div id="bg-layer"></div>
<div class="gear-btn" onclick="openNav('main-list')">⚙️</div>

<div class="container">
    <div class="avatar-row">
        <div id="ui-p1" class="avatar" onclick="document.getElementById('f1').click()"></div>
        <div style="font-size: 25px; animation: pulse 1s infinite;">❤️</div>
        <div id="ui-p2" class="avatar" onclick="document.getElementById('f2').click()"></div>
    </div>
    <div class="glass-card">
        <div id="ui-names" style="opacity: 0.8; letter-spacing: 1px;">МЫ ВМЕСТЕ</div>
        <div id="ui-days" class="days-big">0</div>
        <div style="opacity: 0.8;">дней</div>
    </div>
    <div id="ui-timeline" style="text-align: left;"></div>
</div>

<div id="menu-overlay">
    <!-- Главное меню -->
    <div id="main-list" class="sub-section">
        <h2 style="margin-top: 0;">Настройки ✨</h2>
        <button class="menu-row" onclick="openNav('sec-profile')">👤 Профиль пары <span>></span></button>
        <button class="menu-row" onclick="openNav('sec-style')">🎨 Оформление <span>></span></button>
        <button class="menu-row" onclick="openNav('sec-dates')">🗓️ Свои события <span>></span></button>
        <button class="save-btn" onclick="saveAll()">СОХРАНИТЬ ВСЁ</button>
        <button onclick="closeNav()" style="width:100%; border:none; background:none; margin-top:15px; color:#999;">Закрыть</button>
    </div>

    <!-- Профиль -->
    <div id="sec-profile" class="sub-section">
        <button onclick="openNav('main-list')" style="color:#ff4d6d; border:none; background:none; font-weight:bold; margin-bottom:15px;">← Назад</button>
        <h3>Имена и Дата</h3>
        <input type="text" id="in-n1" placeholder="Ваше имя">
        <input type="text" id="in-n2" placeholder="Имя половинки">
        <input type="date" id="in-date">
    </div>

    <!-- Оформление -->
    <div id="sec-style" class="sub-section">
        <button onclick="openNav('main-list')" style="color:#ff4d6d; border:none; background:none; font-weight:bold; margin-bottom:15px;">← Назад</button>
        <h3>Стиль</h3>
        <label>Цвет фона:</label>
        <select id="in-color" onchange="document.getElementById('bg-layer').style.background = this.value">
            <option value="linear-gradient(45deg, #ff4e50, #f9d423, #ff006e, #8338ec)">Розовый (Стандарт)</option>
            <option value="linear-gradient(45deg, #1a1a2e, #16213e)">Ночной синий</option>
            <option value="black">Черный</option>
        </select>
        <label>Тема меню:</label>
        <select id="in-ui">
            <option value="light">Светлая</option>
            <option value="dark">Темная</option>
        </select>
    </div>

    <!-- События -->
    <div id="sec-dates" class="sub-section">
        <button onclick="openNav('main-list')" style="color:#ff4d6d; border:none; background:none; font-weight:bold; margin-bottom:15px;">← Назад</button>
        <h3>Ваша дата</h3>
        <input type="text" id="in-ev-n" placeholder="Название (напр. Поцелуй)">
        <input type="date" id="in-ev-d">
        <button class="save-btn" style="background:#4caf50;" onclick="addManual()">Добавить в ленту</button>
    </div>
</div>

<input type="file" id="f1" accept="image/*" onchange="loadPhoto(this, 'pic1')" style="display:none">
<input type="file" id="f2" accept="image/*" onchange="loadPhoto(this, 'pic2')" style="display:none">

<script>
    let lsKey = "love_v100_final";
    let state = JSON.parse(localStorage.getItem(lsKey)) || { n1:'Ты', n2:'Половинка', date:'2024-01-01', pic1:'', pic2:'', color:'linear-gradient(45deg, #ff4e50, #f9d423, #ff006e, #8338ec)', ui:'light', custom:[] };

    function openNav(id) {
        document.getElementById('menu-overlay').style.display = 'block';
        document.querySelectorAll('.sub-section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }
    function closeNav() { document.getElementById('menu-overlay').style.display = 'none'; }

    function loadPhoto(input, key) {
        const reader = new FileReader();
        reader.onload = (e) => { state[key] = e.target.result; update(); };
        reader.readAsDataURL(input.files[0]);
    }

    function addManual() {
        let n = document.getElementById('in-ev-n').value;
        let d = document.getElementById('in-ev-date') ? document.getElementById('in-ev-date').value : document.getElementById('in-ev-d').value;
        if(n && d) { state.custom.push({n, d}); update(); alert("Добавлено!"); }
    }

    function saveAll() {
        state.n1 = document.getElementById('in-n1').value || state.n1;
        state.n2 = document.getElementById('in-n2').value || state.n2;
        state.date = document.getElementById('in-date').value || state.date;
        state.ui = document.getElementById('in-ui').value;
        state.color = document.getElementById('in-color').value;
        update();
        closeNav();
    }

    function update() {
        localStorage.setItem(lsKey, JSON.stringify(state));
        render();
    }

    function getWord(y) {
        if (y % 10 === 1 && y % 100 !== 11) return "год";
        if ([2,3,4].includes(y % 10) && ![12,13,14].includes(y % 100)) return "года";
        return "лет";
    }

    function render() {
        document.getElementById('bg-layer').style.background = state.color;
        document.getElementById('menu-overlay').style.background = state.ui === 'dark' ? '#121212' : '#fff';
        document.getElementById('menu-overlay').style.color = state.ui === 'dark' ? '#fff' : '#000';
        
        document.getElementById('ui-names').innerText = state.n1 + " + " + state.n2;
        let start = new Date(state.date);
        let today = new Date();
        document.getElementById('ui-days').innerText = Math.floor((today - start) / 86400000);
        
        if(state.pic1) document.getElementById('ui-p1').style.backgroundImage = "url(" + state.pic1 + ")";
        if(state.pic2) document.getElementById('ui-p2').style.backgroundImage = "url(" + state.pic2 + ")";

        let listUI = document.getElementById('ui-timeline');
        listUI.innerHTML = '<h3 style="margin-top:20px;">Лента времени ❤️</h3>';
        
        let all = [];
        // 10 лет этапов
        for(let i=1; i<=120; i++) {
            let d = new Date(start);
            d.setMonth(d.getMonth() + i);
            if(i < 12) all.push({n: i + " мес. вместе ✨", d: d});
            else if(i % 6 === 0) {
                let y = Math.floor(i/12);
                let m = i % 12;
                let lbl = m === 0 ? y + " " + getWord(y) + " вместе 💎" : y + " г. и " + m + " мес. ⚡️";
                all.push({n: lbl, d: d});
            }
        }
        state.custom.forEach(c => all.push({n: c.n, d: new Date(c.d)}));
        all.sort((a,b) => a.d - b.d);

        all.forEach(ev => {
            let left = Math.ceil((ev.d - today) / 86400000);
            let past = left <= 0;
            listUI.innerHTML += '<div class="event-box ' + (past ? 'passed' : '') + '">' +
                '<span style="font-size:14px; font-weight:bold;">' + ev.n + '</span>' +
                '<span style="color:#ffeb3b; font-weight:bold;">' + (past ? "✅" : left + " дн.") + '</span>' +
                '</div>';
        });
    }

    window.onload = function() {
        document.getElementById('in-n1').value = state.n1;
        document.getElementById('in-n2').value = state.n2;
        document.getElementById('in-date').value = state.date;
        render();
    };
</script>
</body>
</html>
