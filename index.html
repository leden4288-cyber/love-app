<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Love Widget Pro</title>
    <script src="https://telegram.org"></script>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --bg-color: #4a0e0e; --text-color: #ffffff; --card-bg: rgba(255, 255, 255, 0.1); }
        
        body { 
            margin: 0; font-family: 'Montserrat', sans-serif; 
            background: var(--bg-color); color: var(--text-color);
            min-height: 100vh; transition: 0.3s;
        }

        /* ГЛАВНЫЙ ЭКРАН */
        .container { width: 90%; max-width: 400px; margin: 0 auto; padding: 60px 0 20px; text-align: center; }
        
        .settings-btn {
            position: fixed; top: 20px; left: 20px; width: 38px; height: 38px;
            background: rgba(255,255,255,0.2); border-radius: 50%;
            display: flex; align-items: center; justify-content: center; z-index: 100; cursor: pointer;
        }

        .avatar-row { display: flex; justify-content: center; align-items: center; gap: 20px; margin-bottom: 30px; }
        .avatar { width: 95px; height: 95px; border-radius: 50%; border: 2px solid white; background: rgba(255,255,255,0.1) center/cover; cursor: pointer; }
        
        .main-card { background: var(--card-bg); backdrop-filter: blur(10px); border-radius: 25px; padding: 35px 15px; margin-bottom: 30px; }
        .days-val { font-size: 85px; font-weight: 900; line-height: 1; margin: 5px 0; }
        
        .event-list-title { text-align: left; font-size: 18px; font-weight: 700; margin: 20px 0 15px; }
        .event-item { background: var(--card-bg); border-radius: 18px; padding: 18px 20px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
        .check-box { width: 24px; height: 24px; background: #4caf50; border-radius: 5px; display: flex; align-items: center; justify-content: center; color: white; font-size: 14px; }

        /* ОКНО НАСТРОЕК (iOS STYLE) */
        #settings-page {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #ffffff; color: #333333; transform: translateY(100%);
            transition: 0.5s cubic-bezier(0.32, 0.72, 0, 1); z-index: 200;
            padding: 25px; box-sizing: border-box; overflow-y: auto;
        }
        #settings-page.active { transform: translateY(0); }
        
        .header { font-size: 24px; font-weight: 800; display: flex; align-items: center; gap: 10px; margin-bottom: 30px; }
        .section-label { font-weight: 700; font-size: 16px; margin: 25px 0 12px; display: flex; align-items: center; gap: 10px; }
        
        .color-row { display: flex; gap: 15px; margin-bottom: 15px; }
        .color-dot { width: 48px; height: 48px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; }
        .color-dot.active { border-color: #333; }

        input[type="range"] { width: 100%; height: 6px; background: #eee; border-radius: 10px; -webkit-appearance: none; margin: 15px 0; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 22px; height: 22px; background: #999; border-radius: 50%; cursor: pointer; }

        input[type="text"], input[type="date"], select {
            width: 100%; padding: 16px; border: 1px solid #efefef; border-radius: 14px;
            font-size: 16px; font-family: inherit; margin-bottom: 15px; background: #f9f9f9; box-sizing: border-box;
        }

        .save-btn {
            background: #ff4d6d; color: white; border: none; padding: 18px;
            border-radius: 18px; width: 100%; font-weight: 800; font-size: 17px;
            margin-top: 40px; box-shadow: 0 10px 20px rgba(255,77,109,0.2);
        }

        /* ТЕМЫ */
        body.light-theme { --bg-color: #f5f5f5; --text-color: #333; --card-bg: #fff; }
        body.light-theme .avatar { border-color: #333; }
        body.dark-theme { --bg-color: #121212; --text-color: #fff; --card-bg: #1e1e1e; }
        
        input[type="file"] { display: none; }
    </style>
</head>
<body>

<div class="settings-btn" onclick="openSettings()">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M12 15c-1.66 0-3-1.34-3-3s1.34-3 3-3 3 1.34 3 3-1.34 3-3 3zm0-10c-1.07 0-1.95.84-2 1.9L9.74 8.5c-.32.12-.61.28-.89.47l-1.5-.9c-.93-.56-2.14-.24-2.7.69l-1.5 2.59c-.56.97-.24 2.18.72 2.73l1.5.85c-.03.22-.05.44-.05.66s.02.44.05.66l-1.5.85c-.96.55-1.28 1.76-.72 2.73l1.5 2.59c.56.93 1.77 1.25 2.7.69l1.5-.9c.28.19.57.35.89.47l.26 1.6c.1.97.93 1.75 1.93 1.75h3c1 0 1.83-.78 1.93-1.75l.26-1.6c.32-.12.61-.28.89-.47l1.5.9c.93.56 2.14.24 2.7-.69l1.5-2.59c.56-.97.24-2.18-.72-2.73l-1.5-.85c.03-.22.05-.44.05-.66s-.02-.44-.05-.66l1.5-.85c.96-.55 1.28-1.76.72-2.73l-1.5-2.59c-.56-.93-1.77-1.25-2.7-.69l-1.5.9c-.28-.19-.57-.35-.89-.47l-.26-1.6C13.95 5.84 13.07 5 12 5z"/></svg>
</div>

<div class="container">
    <div class="avatar-row">
        <div id="p1" class="avatar" onclick="document.getElementById('f1').click()"></div>
        <div style="font-size: 28px; color: #ff4d4d;">❤️</div>
        <div id="p2" class="avatar" onclick="document.getElementById('f2').click()"></div>
    </div>

    <div class="main-card">
        <div id="displayNames" style="font-size:14px; opacity:0.8; text-transform: uppercase;">ТЫ + ПОЛОВИНКА</div>
        <div id="displayDays" class="days-val">0</div>
        <div style="font-size:14px; opacity:0.8;">дней вместе</div>
    </div>

    <div class="event-list-title">Этапы любви</div>
    <div id="eventList"></div>
</div>

<!-- ОКНО НАСТРОЕК -->
<div id="settings-page">
    <div class="header">Настройки ✨</div>

    <div class="section-label">🎨 Цвет фона:</div>
    <div class="color-row">
        <div class="color-dot" style="background: #800000;" onclick="changeColor('#800000')"></div>
        <div class="color-dot" style="background: #1a3c6e;" onclick="changeColor('#1a3c6e')"></div>
        <div class="color-dot" style="background: #1a1a1a;" onclick="changeColor('#1a1a1a')"></div>
    </div>
    <div style="font-size: 14px; color: #666;">Свой цвет:</div>
    <input type="range" min="0" max="360" oninput="changeHue(this.value)">

    <div class="section-label">🌓 Тема приложения:</div>
    <select id="selectTheme" onchange="changeUI(this.value)">
        <option value="glass">Стеклянная (стандарт)</option>
        <option value="light">Светлая тема</option>
        <option value="dark">Темная тема</option>
    </select>

    <div class="section-label">👥 О паре:</div>
    <input type="text" id="name1" placeholder="Ты">
    <input type="text" id="name2" placeholder="Половинка">
    <input type="date" id="startDate">

    <button class="save-btn" onclick="saveSettings()">СОХРАНИТЬ</button>
    <button onclick="closeSettings()" style="width:100%; background:none; border:none; margin-top:20px; color:#aaa; font-weight:600;">Назад</button>
</div>

<input type="file" id="f1" accept="image/*" onchange="loadPhoto(this, 'pic1')">
<input type="file" id="f2" accept="image/*" onchange="loadPhoto(this, 'pic2')">

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    let state = JSON.parse(localStorage.getItem('love_final_pro')) || {
        n1: 'Ты', n2: 'Половинка', date: '2024-01-01',
        pic1: '', pic2: '', color: '#4a0e0e', ui: 'glass'
    };

    function openSettings() { document.getElementById('settings-page').classList.add('active'); }
    function closeSettings() { document.getElementById('settings-page').classList.remove('active'); }

    function changeColor(c) { state.color = c; render(); }
    function changeHue(h) { state.color = `hsl(${h}, 60%, 20%)`; render(); }
    function changeUI(u) { state.ui = u; render(); }

    function loadPhoto(input, key) {
        if (input.files && input.files) {
            const reader = new FileReader();
            reader.onload = (e) => { state[key] = e.target.result; render(); save(); };
            reader.readAsDataURL(input.files);
        }
    }

    function saveSettings() {
        state.n1 = document.getElementById('name1').value || state.n1;
        state.n2 = document.getElementById('name2').value || state.n2;
        state.date = document.getElementById('startDate').value || state.date;
        save();
        closeSettings();
    }

    function save() { localStorage.setItem('love_final_pro', JSON.stringify(state)); }

    function render() {
        // Применяем цвета и темы
        document.body.style.setProperty('--bg-color', state.color);
        document.body.className = state.ui + '-theme';

        document.getElementById('displayNames').innerText = (state.n1 + " + " + state.n2).toUpperCase();
        
        const start = new Date(state.date);
        const today = new Date();
        const diff = Math.floor((today - start) / 86400000);
        document.getElementById('displayDays').innerText = diff > 0 ? diff : 0;

        if(state.pic1) document.getElementById('p1').style.backgroundImage = `url(${state.pic1})`;
        if(state.pic2) document.getElementById('p2').style.backgroundImage = `url(${state.pic2})`;

        // Отрисовка этапов
        const list = document.getElementById('eventList');
        list.innerHTML = '';
        const milestones = [
            {n: "1 месяц ✨", m: 1}, {n: "3 месяца ⚡️", m: 3}, 
            {n: "Полгода ❤️", m: 6}, {n: "1 год 💎", m: 12}
        ];

        milestones.forEach(ms => {
            let d = new Date(start); d.setMonth(d.getMonth() + ms.m);
            let left = Math.ceil((d - today) / 86400000);
            let past = left <= 0;
            list.innerHTML += `<div class="event-item" style="opacity: ${past ? 0.6 : 1}">
                <div style="font-size:15px; font-weight:600;">${ms.n}</div>
                ${past ? '<div class="check-box">✓</div>' : '<div style="font-weight:800; color:#ffeb3b;">' + left + ' дн.</div>'}
            </div>`;
        });
    }

    window.onload = () => {
        document.getElementById('name1').value = state.n1;
        document.getElementById('name2').value = state.n2;
        document.getElementById('startDate').value = state.date;
        document.getElementById('selectTheme').value = state.ui;
        render();
    };
</script>
</body>
</html>
