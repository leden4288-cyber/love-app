<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Love Widget Custom Pro</title>
    <script src="https://telegram.org"></script>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root {
            --bg-color: linear-gradient(45deg, #a71d31, #3f0d12);
            --card-bg: rgba(255, 255, 255, 0.1);
            --text-color: #ffffff;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        body {
            margin: 0;
            font-family: 'Montserrat', sans-serif;
            background: var(--bg-color);
            background-attachment: fixed;
            color: var(--text-color);
            transition: 0.5s;
            min-height: 100vh;
        }

        /* Кнопка настроек слева вверху */
        .settings-trigger {
            position: fixed; top: 15px; left: 15px;
            font-size: 24px; cursor: pointer; z-index: 100;
            background: var(--card-bg); border-radius: 50%;
            width: 45px; height: 45px; display: flex; align-items: center; justify-content: center;
            backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2);
        }

        .container { width: 90%; max-width: 400px; margin: 0 auto; padding-top: 70px; text-align: center; }

        /* Стеклянные карточки */
        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: var(--shadow);
            padding: 25px;
            margin-bottom: 20px;
        }

        .days-num { font-size: 80px; font-weight: 900; margin: 0; line-height: 1; }
        
        .avatar { width: 90px; height: 90px; border-radius: 50%; border: 3px solid #fff; background-size: cover; background-position: center; cursor: pointer; }

        /* Панель настроек (Overlay) */
        #settings-panel {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #fff; color: #333; transform: translateX(-100%);
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1000; padding: 25px; box-sizing: border-box; overflow-y: auto;
        }
        #settings-panel.open { transform: translateX(0); }

        .config-section { margin-bottom: 25px; border-bottom: 1px solid #eee; padding-bottom: 15px; }
        .color-presets { display: flex; gap: 10px; margin-top: 10px; }
        .color-circle { width: 35px; height: 35px; border-radius: 50%; cursor: pointer; border: 2px solid #ddd; }

        input, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; }
        .btn { background: #ff4d6d; color: white; padding: 15px; border: none; border-radius: 15px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

<div class="settings-trigger" onclick="toggleSettings(true)">⚙️</div>

<div class="container">
    <div style="display:flex; justify-content:center; align-items:center; gap:20px; margin-bottom:30px;">
        <div id="v-p1" class="avatar" onclick="document.getElementById('f1').click()"></div>
        <div style="font-size:30px;">❤️</div>
        <div id="v-p2" class="avatar" onclick="document.getElementById('f2').click()"></div>
    </div>

    <div class="glass-card">
        <div id="v-names" style="font-size:14px; letter-spacing:2px; opacity:0.8; margin-bottom:10px;">МЫ ВМЕСТЕ</div>
        <div id="v-days" class="days-num">0</div>
        <div style="font-size:16px;">дней</div>
    </div>

    <div id="v-events"></div>
</div>

<!-- ОКНО НАСТРОЕК -->
<div id="settings-panel">
    <h2 style="margin-top:0;">Настройки ✨</h2>
    
    <div class="config-section">
        <label><b>🎨 Цвет фона:</b></label>
        <div class="color-presets">
            <div class="color-circle" style="background: linear-gradient(45deg, #a71d31, #3f0d12);" onclick="setBg('linear-gradient(45deg, #a71d31, #3f0d12)')"></div>
            <div class="color-circle" style="background: linear-gradient(45deg, #1e3c72, #2a5298);" onclick="setBg('linear-gradient(45deg, #1e3c72, #2a5298)')"></div>
            <div class="color-circle" style="background: linear-gradient(45deg, #000, #434343);" onclick="setBg('linear-gradient(45deg, #000, #434343)')"></div>
        </div>
        <label style="display:block; margin-top:10px;">Свой цвет:</label>
        <input type="color" id="colorPicker" onchange="setBg(this.value)">
    </div>

    <div class="config-section">
        <label><b>🌗 Тема приложения:</b></label>
        <select onchange="setTheme(this.value)">
            <option value="glass">Стеклянная (стандарт)</option>
            <option value="light">Светлая</option>
            <option value="dark">Тёмная</option>
        </select>
    </div>

    <div class="config-section">
        <label><b>👥 О паре:</b></label>
        <input type="text" id="i-n1" placeholder="Ваше имя">
        <input type="text" id="i-n2" placeholder="Имя половинки">
        <input type="date" id="i-date">
    </div>

    <button class="btn" onclick="saveAll()">СОХРАНИТЬ</button>
    <button class="btn" style="background:#888;" onclick="toggleSettings(false)">ЗАКРЫТЬ</button>
</div>

<input type="file" id="f1" accept="image/*" style="display:none;" onchange="upload(this, 'pic1')">
<input type="file" id="f2" accept="image/*" style="display:none;" onchange="upload(this, 'pic2')">

<script>
    let storageKey = "love_custom_v1";
    let state = JSON.parse(localStorage.getItem(storageKey)) || {
        n1: 'Ты', n2: 'Половинка', date: '2024-01-01',
        pic1: '', pic2: '', bg: 'linear-gradient(45deg, #a71d31, #3f0d12)', theme: 'glass'
    };

    function toggleSettings(open) {
        document.getElementById('settings-panel').classList.toggle('open', open);
    }

    function setBg(color) {
        state.bg = color;
        document.body.style.background = color;
    }

    function setTheme(t) {
        state.theme = t;
        const r = document.documentElement;
        if(t === 'light') {
            r.style.setProperty('--card-bg', 'rgba(255,255,255,0.8)');
            r.style.setProperty('--text-color', '#333');
        } else if(t === 'dark') {
            r.style.setProperty('--card-bg', 'rgba(0,0,0,0.6)');
            r.style.setProperty('--text-color', '#fff');
        } else {
            r.style.setProperty('--card-bg', 'rgba(255,255,255,0.1)');
            r.style.setProperty('--text-color', '#fff');
        }
    }

    function upload(input, key) {
        const reader = new FileReader();
        reader.onload = (e) => {
            state[key] = e.target.result;
            saveAll();
        };
        reader.readAsDataURL(input.files[0]);
    }

    function saveAll() {
        state.n1 = document.getElementById('i-n1').value || state.n1;
        state.n2 = document.getElementById('i-n2').value || state.n2;
        state.date = document.getElementById('i-date').value || state.date;
        localStorage.setItem(storageKey, JSON.stringify(state));
        render();
        toggleSettings(false);
    }

    function render() {
        document.getElementById('v-names').innerText = state.n1 + " + " + state.n2;
        const diff = Math.floor((new Date() - new Date(state.date)) / 86400000);
        document.getElementById('v-days').innerText = diff > 0 ? diff : 0;
        document.body.style.background = state.bg;
        setTheme(state.theme);

        if(state.pic1) document.getElementById('v-p1').style.backgroundImage = `url(${state.pic1})`;
        if(state.pic2) document.getElementById('v-p2').style.backgroundImage = `url(${state.pic2})`;
        
        const list = document.getElementById('v-events');
        list.innerHTML = '<h3 style="margin-top:30px;">Этапы любви</h3>';
        
        [{n:"1 месяц", m:1}, {n:"Полгода", m:6}, {n:"1 год", m:12}].forEach(m => {
            let d = new Date(state.date); d.setMonth(d.getMonth() + m.m);
            const left = Math.ceil((d - new Date()) / 86400000);
            list.innerHTML += `<div class="glass-card" style="padding:15px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center;">
                <span>${m.n}</span>
                <span style="font-weight:bold; color:#ffeb3b;">${left <= 0 ? "✅" : left + " дн."}</span>
            </div>`;
        });
    }

    window.onload = () => {
        document.getElementById('i-n1').value = state.n1;
        document.getElementById('i-n2').value = state.n2;
        document.getElementById('i-date').value = state.date;
        render();
    };
</script>
</body>
</html>
