<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Love Premium Widget</title>
    <script src="https://telegram.org"></script>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --p: #ff4d6d; --glass: rgba(255, 255, 255, 0.15); }
        body { margin: 0; font-family: 'Montserrat', sans-serif; color: white; min-height: 100vh; overflow-x: hidden; }
        
        /* Тот самый живой фон */
        #bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; 
            background: linear-gradient(45deg, #ff4e50, #f9d423, #ff006e, #8338ec);
            background-size: 400% 400%; animation: move 15s infinite; }
        @keyframes move { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }

        .container { width: 90%; max-width: 400px; margin: 0 auto; padding: 60px 0 30px; text-align: center; }
        
        .settings-trigger { position: fixed; top: 15px; left: 15px; background: var(--glass); backdrop-filter: blur(10px); 
            border: 1px solid rgba(255,255,255,0.2); width: 45px; height: 45px; border-radius: 12px; 
            display: flex; align-items: center; justify-content: center; font-size: 20px; z-index: 100; cursor: pointer; }

        .glass-card { background: var(--glass); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border-radius: 25px; border: 1px solid rgba(255,255,255,0.2); padding: 25px 15px; 
            margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        
        .days-val { font-size: 80px; font-weight: 900; line-height: 1; margin: 10px 0; text-shadow: 0 5px 15px rgba(0,0,0,0.1); }

        .event-item { background: var(--glass); border-radius: 18px; padding: 15px 20px; margin-bottom: 10px; 
            display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .event-item.past { opacity: 0.5; filter: grayscale(0.5); }
        
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); 
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); transform: translateX(-100%); 
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 1000; padding: 30px; box-sizing: border-box; overflow-y: auto; }
        .overlay.active { transform: translateX(0); }
        
        .sub-menu { display: none; }
        .sub-menu.active { display: block; }

        .menu-btn { background: var(--glass); border: 1px solid rgba(255,255,255,0.2); color: white;
            padding: 18px; border-radius: 15px; margin-bottom: 12px; display: flex; justify-content: space-between; 
            align-items: center; font-weight: 600; cursor: pointer; width: 100%; text-align: left; font-family: inherit; }
        
        .btn-main { background: var(--p); border: none; padding: 18px; border-radius: 15px; width: 100%; 
            color: white; font-weight: 800; margin-top: 20px; box-shadow: 0 5px 20px rgba(255,77,109,0.4); }

        input, select { width: 100%; padding: 14px; margin: 10px 0; border-radius: 12px; border: 1px solid rgba(255,255,255,0.2); 
            background: rgba(255,255,255,0.1); color: white; box-sizing: border-box; font-size: 16px; font-family: inherit; }
        input::placeholder { color: rgba(255,255,255,0.5); }
        
        .avatar { width: 85px; height: 85px; border-radius: 50%; border: 3px solid #fff; background: var(--glass) center/cover; cursor: pointer; box-shadow: 0 5px 20px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

<div id="bg"></div>
<div class="settings-trigger" onclick="openMenu('main-nav')">⚙️</div>

<div class="container">
    <div style="display: flex; justify-content: center; gap: 20px; margin-bottom: 25px;">
        <div id="v-p1" class="avatar" onclick="document.getElementById('f1').click()"></div>
        <div style="font-size: 35px; animation: pulse 1s infinite;">❤️</div>
        <div id="v-p2" class="avatar" onclick="document.getElementById('f2').click()"></div>
    </div>
    <div class="glass-card">
        <div id="v-names" style="font-size: 14px; letter-spacing: 2px; opacity: 0.8; text-transform: uppercase;">ЗАГРУЗКА...</div>
        <div id="v-days" class="days-val">0</div>
        <div style="font-size: 18px; opacity: 0.7;">дней вместе</div>
    </div>
    <div id="v-list" style="text-align: left;"></div>
</div>

<div id="settings-root" class="overlay">
    <div id="main-nav" class="sub-menu active">
        <h2 style="margin-top: 0; font-size: 28px;">Настройки ✨</h2>
        <button class="menu-btn" onclick="openMenu('profile-set')">👤 Профиль пары <span>›</span></button>
        <button class="menu-btn" onclick="openMenu('style-set')">🎨 Фон и Оформление <span>›</span></button>
        <button class="menu-btn" onclick="openMenu('events-set')">🗓️ Важные события <span>›</span></button>
        <button class="btn-main" onclick="saveAndClose()">СОХРАНИТЬ ВСЁ</button>
        <button onclick="closeSettings()" style="width: 100%; border: none; background: none; color: #ccc; margin-top: 20px;">Закрыть</button>
    </div>

    <div id="profile-set" class="sub-menu">
        <button onclick="openMenu('main-nav')" style="border:none; background:none; color:var(--p); font-weight:700; margin-bottom:20px; font-size: 16px;">‹ Назад</button>
        <h3>Данные пары</h3>
        <input type="text" id="in-n1" placeholder="Твое имя">
        <input type="text" id="in-n2" placeholder="Имя половинки">
        <input type="date" id="in-date">
    </div>

    <div id="style-set" class="sub-menu">
        <button onclick="openMenu('main-nav')" style="border:none; background:none; color:var(--p); font-weight:700; margin-bottom:20px; font-size: 16px;">‹ Назад</button>
        <h3>Оформление</h3>
        <select id="in-theme" onchange="previewTheme()" style="color: black;">
            <option value="linear-gradient(45deg, #ff4e50, #f9d423, #ff006e, #8338ec)">Розовый закат 🔥</option>
            <option value="linear-gradient(45deg, #1a1a2e, #16213e, #0f3460, #1a1a2e)">Глубокая ночь 🌑</option>
            <option value="linear-gradient(45deg, #00b09b, #96c93d, #00b09b, #56ab2f)">Весенний лес 🌿</option>
            <option value="linear-gradient(45deg, #8e2de2, #4a00e0, #8e2de2, #4a00e0)">Космос 🌌</option>
        </select>
    </div>

    <div id="events-set" class="sub-menu">
        <button onclick="openMenu('main-nav')" style="border:none; background:none; color:var(--p); font-weight:700; margin-bottom:20px; font-size: 16px;">‹ Назад</button>
        <h3>Ваши события</h3>
        <input type="text" id="cust-n" placeholder="Название (напр. Первый поцелуй)">
        <input type="date" id="cust-d">
        <button class="btn-main" style="background:#4caf50;" onclick="addCustom()">Добавить в ленту</button>
    </div>
</div>

<input type="file" id="f1" accept="image/*" onchange="upPhoto(this, 'pic1')" style="display:none;">
<input type="file" id="f2" accept="image/*" onchange="upPhoto(this, 'pic2')" style="display:none;">

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    let state = JSON.parse(localStorage.getItem('love_final_v50')) || {
        n1: 'Ты', n2: 'Она', date: '2024-01-01',
        pic1: '', pic2: '', theme: 'linear-gradient(45deg, #ff4e50, #f9d423, #ff006e, #8338ec)', custom: []
    };

    function openMenu(id) {
        document.getElementById('settings-root').classList.add('active');
        document.querySelectorAll('.sub-menu').forEach(m => m.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function closeSettings() { document.getElementById('settings-root').classList.remove('active'); }
    function previewTheme() { document.getElementById('bg').style.background = document.getElementById('in-theme').value; }

    function saveAndClose() {
        state.n1 = document.getElementById('in-n1').value || state.n1;
        state.n2 = document.getElementById('in-n2').value || state.n2;
        state.date = document.getElementById('in-date').value || state.date;
        state.theme = document.getElementById('in-theme').value;
        localStorage.setItem('love_final_v50', JSON.stringify(state));
        render();
        closeSettings();
    }

    function upPhoto(input, key) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => { state[key] = e.target.result; render(); };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function addCustom() {
        const name = document.getElementById('cust-n').value;
        const date = document.getElementById('cust-d').value;
        if(name && date) {
            state.custom.push({ name, date });
            document.getElementById('cust-n').value = '';
            document.getElementById('cust-d').value = '';
            render();
            alert("Событие добавлено!");
        }
    }

    function render() {
        document.getElementById('bg').style.background = state.theme;
        document.getElementById('v-names').innerText = `${state.n1} + ${state.n2}`;
        const start = new Date(state.date);
        const today = new Date();
        const diff = Math.floor((today - start) / 86400000);
        document.getElementById('v-days').innerText = diff > 0 ? diff : 0;

        if(state.pic1) document.getElementById('v-p1').style.backgroundImage = `url(${state.pic1})`;
        if(state.pic2) document.getElementById('v-p2').style.backgroundImage = `url(${state.pic2})`;

        const list = document.getElementById('v-list');
        list.innerHTML = '<h3 style="margin: 20px 0 15px; font-size: 20px;">Лента времени ❤️</h3>';

        let events = [];
        // ПОДРОБНАЯ ЛЕНТА (10 лет)
        // Месяцы и Кварталы
        for(let m = 1; m <= 120; m++) {
            let d = new Date(start);
            d.setMonth(d.getMonth() + m);
            if (m < 12) {
                events.push({ n: `${m} месяцев вместе ✨`, d: d });
            } else if (m % 3 === 0) { // Каждые 3 месяца после года
                let yrs = Math.floor(m/12);
                let mon = m % 12;
                let label = mon === 0 ? `${yrs} года вместе 💎` : `${yrs} г. и ${mon} мес. ⚡️`;
                events.push({ n: label, d: d });
            }
        }
        // Красивые числа дней
        const dayMilestones = [100, 200, 300, 400, 500, 600, 700, 800, 900, 1000, 1500, 2000, 2500, 3000];
        dayMilestones.forEach(dm => {
            let d = new Date(start);
            d.setDate(d.getDate() + dm);
            events.push({ n: `${dm} дней любви! 🔥`, d: d });
        });

        state.custom.forEach(c => events.push({ n: c.name, d: new Date(c.date) }));
        
        events.sort((a,b) => a.d - b.d);
        events.forEach(ev => {
            const left = Math.ceil((ev.d - today) / 86400000);
            list.innerHTML += `<div class="event-item ${left <= 0 ? 'past' : ''}">
                <div class="event-name">${ev.n}</div>
                <div class="event-days">${left <= 0 ? '✅' : left + ' дн.'}</div>
            </div>`;
        });
    }

    window.onload = () => {
        document.getElementById('in-n1').value = state.n1;
        document.getElementById('in-n2').value = state.n2;
        document.getElementById('in-date').value = state.date;
        document.getElementById('in-theme').value = state.theme;
        render();
    };
</script>
</body>
</html>
