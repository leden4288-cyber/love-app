<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Love Premium</title>
    <script src="https://telegram.org"></script>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --p: #ff4d6d; --glass: rgba(255, 255, 255, 0.15); }
        body { margin: 0; font-family: 'Montserrat', sans-serif; background: #000; color: white; min-height: 100vh; overflow-x: hidden; transition: 0.5s; }
        #bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background-size: 400% 400% !important; animation: moveBG 15s infinite; transition: 1s; }
        @keyframes moveBG { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }
        .container { width: 90%; max-width: 400px; margin: 0 auto; padding: 60px 0 30px; text-align: center; }
        .gear { position: fixed; top: 20px; left: 15px; width: 42px; height: 42px; background: var(--glass); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; z-index: 100; cursor: pointer; }
        .avatar { width: 85px; height: 85px; border-radius: 50%; border: 3px solid #fff; background: var(--glass) center/cover; cursor: pointer; box-shadow: 0 5px 20px rgba(0,0,0,0.3); }
        .glass-card { background: var(--glass); backdrop-filter: blur(15px); border-radius: 30px; border: 1px solid rgba(255,255,255,0.2); padding: 30px 15px; margin-bottom: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.3); }
        .days-val { font-size: 75px; font-weight: 900; line-height: 1; }
        .item { background: var(--glass); border-radius: 18px; padding: 16px 20px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(255,255,255,0.1); }
        .item.past { opacity: 0.4; }
        
        /* Меню настроек */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; color: #333; transform: translateX(-100%); transition: 0.3s; z-index: 1000; padding: 25px; box-sizing: border-box; overflow-y: auto; }
        .overlay.active { transform: translateX(0); }
        .sub { display: none; }
        .sub.active { display: block; }
        .menu-row { background: #f5f5f5; padding: 18px; border-radius: 15px; margin-bottom: 12px; display: flex; justify-content: space-between; font-weight: bold; border: none; width: 100%; cursor: pointer; font-size: 16px; font-family: inherit; }
        .btn-save { background: var(--p); color: #fff; padding: 18px; border: none; border-radius: 15px; width: 100%; font-weight: 800; font-size: 16px; margin-top: 20px; box-shadow: 0 5px 15px rgba(255,77,109,0.3); cursor: pointer; }
        input, select { width: 100%; padding: 14px; margin: 10px 0; border-radius: 12px; border: 1px solid #ddd; box-sizing: border-box; font-size: 16px; font-family: inherit; }
        .color-dot { width: 45px; height: 45px; border-radius: 50%; display: inline-block; margin: 10px 10px 10px 0; cursor: pointer; border: 3px solid #eee; }
        .del-box { display: flex; justify-content: space-between; background: #fff4f4; padding: 10px; border-radius: 10px; margin-bottom: 8px; border: 1px solid #ffe0e0; }
        .theme-dark-ui { background: #121212 !important; color: #fff !important; }
        .theme-dark-ui .menu-row { background: #1e1e1e; color: #fff; }
    </style>
</head>
<body>

<div id="bg"></div>
<div class="gear" onclick="openMenu('main')">⚙️</div>

<div class="container">
    <div style="display: flex; justify-content: center; gap: 20px; margin-bottom: 25px;">
        <div id="v-p1" class="avatar" onclick="document.getElementById('f1').click()"></div>
        <div style="font-size: 30px; animation: pulse 1.2s infinite;">❤️</div>
        <div id="v-p2" class="avatar" onclick="document.getElementById('f2').click()"></div>
    </div>
    <div class="glass-card">
        <div id="v-names" style="text-transform: uppercase; font-size: 14px; letter-spacing: 2px; opacity: 0.8;">МЫ ВМЕСТЕ</div>
        <div id="v-days" class="days-val">0</div>
        <div style="opacity: 0.7;">дней</div>
    </div>
    <div id="v-list" style="text-align: left;"></div>
</div>

<div id="root" class="overlay">
    <!-- Главное -->
    <div id="main" class="sub">
        <h2 style="margin-top: 0;">Настройки ✨</h2>
        <button class="menu-row" onclick="openMenu('s-prof')">👤 Профиль пары <span>›</span></button>
        <button class="menu-row" onclick="openMenu('s-style')">🎨 Оформление <span>›</span></button>
        <button class="menu-row" onclick="openMenu('s-ev')">🗓️ События <span>›</span></button>
        <button class="btn-save" onclick="saveAll()">СОХРАНИТЬ ВСЁ</button>
        <button onclick="closeMenu()" style="width:100%; border:none; background:none; margin-top:20px; color:#999; cursor:pointer;">Закрыть</button>
    </div>

    <!-- Профиль -->
    <div id="s-prof" class="sub">
        <button onclick="openMenu('main')" style="color:var(--p); border:none; background:none; font-weight:bold; margin-bottom:15px;">‹ Назад</button>
        <h3>Профиль</h3>
        <input type="text" id="i-n1" placeholder="Твое имя">
        <input type="text" id="i-n2" placeholder="Имя половинки">
        <input type="date" id="i-d">
    </div>

    <!-- Оформление -->
    <div id="s-style" class="sub">
        <button onclick="openMenu('main')" style="color:var(--p); border:none; background:none; font-weight:bold; margin-bottom:15px;">‹ Назад</button>
        <h3>Оформление</h3>
        <label>Пресеты:</label><br>
        <div class="color-dot" style="background:#800000;" onclick="setBG('linear-gradient(45deg, #4a0e0e, #800000)')"></div>
        <div class="color-dot" style="background:#ff4e50;" onclick="setBG('linear-gradient(45deg, #ff4e50, #f9d423, #ff006e)')"></div>
        <div class="color-dot" style="background:#ff8c00;" onclick="setBG('linear-gradient(45deg, #ff8c00, #ff4e50)')"></div>
        <br><label>Свой цвет:</label>
        <input type="color" id="i-color" onchange="setBG(this.value)">
        <hr style="opacity:0.2; margin: 15px 0;">
        <label>Тема меню:</label>
        <select id="i-ui"><option value="light">Светлая</option><option value="dark">Темная</option></select>
    </div>

    <!-- События -->
    <div id="s-ev" class="sub">
        <button onclick="openMenu('main')" style="color:var(--p); border:none; background:none; font-weight:bold; margin-bottom:15px;">‹ Назад</button>
        <h3>События</h3>
        <input type="text" id="e-n" placeholder="Название">
        <input type="date" id="e-d">
        <button class="menu-row" style="background:var(--p); color:#fff; justify-content:center;" onclick="addE()">Добавить</button>
        <div id="del-list" style="margin-top:20px;"></div>
    </div>
</div>

<input type="file" id="f1" accept="image/*" onchange="up(this, 'pic1')" style="display:none;">
<input type="file" id="f2" accept="image/*" onchange="up(this, 'pic2')" style="display:none;">

<script>
    const K = "love_v15_stable";
    let s = JSON.parse(localStorage.getItem(K)) || { n1:'Ты', n2:'Она', date:'2024-01-01', pic1:'', pic2:'', bg:'linear-gradient(45deg, #ff4e50, #f9d423, #ff006e, #8338ec)', ui:'light', custom:[] };

    function openMenu(id) {
        document.getElementById('root').classList.add('active');
        document.querySelectorAll('.sub').forEach(x => x.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 's-ev') drawDel();
    }
    function closeMenu() { document.getElementById('root').classList.remove('active'); }
    function setBG(c) { s.bg = c; render(); }

    function up(input, key) {
        const r = new FileReader();
        r.onload = (e) => { s[key] = e.target.result; save(); };
        r.readAsDataURL(input.files);
    }

    function addE() {
        const n = document.getElementById('e-n').value, d = document.getElementById('e-d').value;
        if(n && d) { s.custom.push({n, d}); document.getElementById('e-n').value = ''; save(); drawDel(); }
    }
    function delE(i) { s.custom.splice(i, 1); save(); drawDel(); }

    function drawDel() {
        const c = document.getElementById('del-list');
        c.innerHTML = '<h4>Удаление:</h4>';
        s.custom.forEach((x, i) => {
            c.innerHTML += `<div class="del-box"><span>${x.n}</span><button onclick="delE(${i})" style="color:red; border:none; background:none; font-weight:bold;">Удалить</button></div>`;
        });
    }

    function saveAll() {
        s.n1 = document.getElementById('i-n1').value || s.n1;
        s.n2 = document.getElementById('i-n2').value || s.n2;
        s.date = document.getElementById('i-d').value || s.date;
        s.ui = document.getElementById('i-ui').value;
        save(); closeMenu();
    }

    function save() { localStorage.setItem(K, JSON.stringify(s)); render(); }

    function getW(y) {
        if (y % 10 === 1 && y % 100 !== 11) return "год";
        if ([2,3,4].includes(y % 10) && ![12,13,14].includes(y % 100)) return "года";
        return "лет";
    }

    function render() {
        document.getElementById('bg').style.background = s.bg;
        document.getElementById('root').className = 'overlay ' + (s.ui === 'dark' ? 'theme-dark-ui' : '');
        document.getElementById('v-names').innerText = s.n1 + " + " + s.n2;
        let start = new Date(s.date);
        let now = new Date();
        document.getElementById('v-days').innerText = Math.floor((now - start) / 86400000);
        if(s.pic1) document.getElementById('v-p1').style.backgroundImage = `url(${s.pic1})`;
        if(s.pic2) document.getElementById('v-p2').style.backgroundImage = `url(${s.pic2})`;

        let L = document.getElementById('v-list');
        L.innerHTML = '<h3>Лента ❤️</h3>';
        let all = [];
        for(let i=1; i<=120; i++) {
            let d = new Date(start); d.setMonth(d.getMonth() + i);
            if(i < 12) all.push({n: i + " мес. ✨", d: d});
            else if(i % 6 === 0) {
                let y = Math.floor(i/12);
                let lbl = (i % 12 === 0) ? y + " " + getW(y) + " 💎" : y + " г. и 6 мес. ⚡️";
                all.push({n: lbl, d: d});
            }
        }
        s.custom.forEach(c => all.push({n: c.n, d: new Date(c.d)}));
        all.sort((a,b) => a.d - b.d);
        all.forEach(ev => {
            let diff = Math.ceil((ev.d - now) / 86400000);
            L.innerHTML += `<div class="item ${diff<=0?'past':''}"><span>${ev.n}</span><b>${diff<=0?'✅':diff+' дн.'}</b></div>`;
        });
    }

    window.onload = () => {
        document.getElementById('i-n1').value = s.n1;
        document.getElementById('i-n2').value = s.n2;
        document.getElementById('i-d').value = s.date;
        render();
    }
</script>
</body>
</html>
