<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Love Widget Final</title>
    <script src="https://telegram.org"></script>
    <style>
        body { margin: 0; font-family: sans-serif; background: #000; color: white; text-align: center; }
        #bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: linear-gradient(45deg, #4a0e0e, #800000); }
        .container { width: 90%; max-width: 400px; margin: 0 auto; padding: 50px 0; }
        .gear { position: fixed; top: 20px; left: 20px; width: 40px; height: 40px; background: rgba(255,255,255,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 100; cursor: pointer; }
        .avatar-row { display: flex; justify-content: center; gap: 15px; margin-bottom: 20px; }
        .avatar { width: 85px; height: 85px; border-radius: 50%; border: 2px solid #fff; background-size: cover; background-position: center; background-color: rgba(255,255,255,0.1); }
        .card { background: rgba(255,255,255,0.15); backdrop-filter: blur(15px); border-radius: 25px; padding: 30px 10px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.1); }
        .days { font-size: 65px; font-weight: bold; }
        .item { background: rgba(255,255,255,0.1); border-radius: 15px; padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .item.past { opacity: 0.5; }
        .check { width: 22px; height: 22px; background: #4caf50; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-size: 14px; }
        
        /* Меню */
        #menu { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; color: black; display: none; z-index: 1000; padding: 20px; box-sizing: border-box; overflow-y: auto; text-align: left; }
        .sub { display: none; }
        .sub.active { display: block; }
        .row { background: #f0f0f0; padding: 18px; border-radius: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; font-weight: bold; cursor: pointer; border: none; width: 100%; }
        input, select { width: 100%; padding: 12px; margin: 8px 0 15px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
        .btn { background: #ff4d6d; color: white; border: none; padding: 15px; border-radius: 12px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .del-item { display: flex; justify-content: space-between; padding: 10px; background: #fff1f1; border-radius: 10px; margin-bottom: 5px; border: 1px solid #ffe0e0; }
    </style>
</head>
<body>

<div id="bg"></div>
<div class="gear" onclick="go('main')">⚙️</div>

<div class="container">
    <div class="avatar-row">
        <div id="v-p1" class="avatar" onclick="document.getElementById('f1').click()"></div>
        <div style="font-size: 25px;">❤️</div>
        <div id="v-p2" class="avatar" onclick="document.getElementById('f2').click()"></div>
    </div>
    <div class="card">
        <div id="v-names">ТЫ + ПОЛОВИНКА</div>
        <div id="v-days" class="days">0</div>
        <div>дней вместе</div>
    </div>
    <div id="v-list"></div>
</div>

<div id="menu">
    <div id="main" class="sub">
        <h2 style="margin-top:0">Настройки ✨</h2>
        <button class="row" onclick="go('p-prof')">👤 Профиль <span>></span></button>
        <button class="row" onclick="go('p-style')">🎨 Оформление <span>></span></button>
        <button class="row" onclick="go('p-date')">🗓️ События <span>></span></button>
        <button class="btn" onclick="saveAll()">СОХРАНИТЬ</button>
        <button class="btn" style="background:#999" onclick="closeM()">Закрыть</button>
    </div>

    <div id="p-prof" class="sub">
        <button onclick="go('main')" style="border:none; background:none; color:#ff4d6d; font-weight:bold; margin-bottom:15px;">< Назад</button>
        <h3>Профиль</h3>
        <input type="text" id="in-n1" placeholder="Имя 1">
        <input type="text" id="in-n2" placeholder="Имя 2">
        <input type="date" id="in-d">
    </div>

    <div id="p-style" class="sub">
        <button onclick="go('main')" style="border:none; background:none; color:#ff4d6d; font-weight:bold; margin-bottom:15px;">< Назад</button>
        <h3>Стиль</h3>
        <label>Цвет фона:</label>
        <select id="in-bg">
            <option value="linear-gradient(45deg, #4a0e0e, #800000)">Бордовый</option>
            <option value="linear-gradient(45deg, #ff4e50, #f9d423)">Розовый</option>
            <option value="linear-gradient(45deg, #1a1a2e, #16213e)">Синий</option>
        </select>
        <label>Тема меню:</label>
        <select id="in-ui">
            <option value="white">Светлая</option>
            <option value="#121212">Темная</option>
        </select>
    </div>

    <div id="p-date" class="sub">
        <button onclick="go('main')" style="border:none; background:none; color:#ff4d6d; font-weight:bold; margin-bottom:15px;">< Назад</button>
        <h3>Ваша дата</h3>
        <input type="text" id="ev-n" placeholder="Название">
        <input type="date" id="ev-d">
        <button class="btn" style="background:#4caf50" onclick="addEv()">Добавить</button>
        <hr>
        <div id="del-list"></div>
    </div>
</div>

<input type="file" id="f1" accept="image/*" onchange="up(this,'pic1')" style="display:none">
<input type="file" id="f2" accept="image/*" onchange="up(this,'pic2')" style="display:none">

<script>
    let state = JSON.parse(localStorage.getItem('love_final_v11')) || { n1:'Ты', n2:'Она', date:'2024-01-01', pic1:'', pic2:'', bg:'linear-gradient(45deg, #4a0e0e, #800000)', ui:'white', custom:[] };

    function go(id) {
        document.getElementById('menu').style.display = 'block';
        document.querySelectorAll('.sub').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'p-date') drawDel();
    }
    function closeM() { document.getElementById('menu').style.display = 'none'; }

    function up(input, key) {
        const r = new FileReader();
        r.onload = (e) => { state[key] = e.target.result; save(); };
        r.readAsDataURL(input.files[0]);
    }

    function addEv() {
        let n = document.getElementById('ev-n').value;
        let d = document.getElementById('ev-d').value;
        if(n && d) { state.custom.push({n, d}); document.getElementById('ev-n').value=''; save(); drawDel(); }
    }

    function delEv(i) { state.custom.splice(i, 1); save(); drawDel(); }

    function drawDel() {
        const c = document.getElementById('del-list');
        c.innerHTML = '<h4>Удалить свои даты:</h4>';
        state.custom.forEach((x, i) => {
            c.innerHTML += `<div class="del-item"><span>${x.n}</span><button onclick="delEv(${i})" style="color:red; border:none; background:none; font-weight:bold;">Удалить</button></div>`;
        });
    }

    function saveAll() {
        state.n1 = document.getElementById('in-n1').value || state.n1;
        state.n2 = document.getElementById('in-n2').value || state.n2;
        state.date = document.getElementById('in-d').value || state.date;
        state.bg = document.getElementById('in-bg').value;
        state.ui = document.getElementById('in-ui').value;
        save(); closeM();
    }

    function save() { localStorage.setItem('love_final_v11', JSON.stringify(state)); render(); }

    function word(y) {
        if (y % 10 === 1 && y % 100 !== 11) return "год";
        if ([2, 3, 4].includes(y % 10) && ![12, 13, 14].includes(y % 100)) return "года";
        return "лет";
    }

    function render() {
        document.getElementById('bg').style.background = state.bg;
        document.getElementById('menu').style.background = state.ui === 'white' ? '#fff' : '#121212';
        document.getElementById('menu').style.color = state.ui === 'white' ? '#000' : '#fff';
        document.getElementById('v-names').innerText = state.n1 + " + " + state.n2;
        let start = new Date(state.date);
        let now = new Date();
        document.getElementById('v-days').innerText = Math.floor((now - start) / 86400000);
        if(state.pic1) document.getElementById('v-p1').style.backgroundImage = `url(${state.pic1})`;
        if(state.pic2) document.getElementById('v-p2').style.backgroundImage = `url(${state.pic2})`;

        let L = document.getElementById('v-list');
        L.innerHTML = '<h3>Лента событий ❤️</h3>';
        let all = [];
        for(let i=1; i<=120; i++) {
            let d = new Date(start); d.setMonth(d.getMonth() + i);
            if(i < 12) all.push({n: i + " мес. вместе ✨", d: d});
            else if(i % 6 === 0) {
                let y = Math.floor(i/12);
                let lbl = (i % 12 === 0) ? y + " " + word(y) + " вместе 💎" : y + " г. и 6 мес. ⚡️";
                all.push({n: lbl, d: d});
            }
        }
        state.custom.forEach(c => all.push({n: c.n, d: new Date(c.d)}));
        all.sort((a,b) => a.d - b.d);
        all.forEach(ev => {
            let diff = Math.ceil((ev.d - now) / 86400000);
            L.innerHTML += `<div class="item ${diff<=0?'past':''}"><span>${ev.n}</span><b>${diff<=0?'✅':diff+' дн.'}</b></div>`;
        });
    }

    window.onload = () => {
        document.getElementById('in-n1').value = state.n1;
        document.getElementById('in-n2').value = state.n2;
        document.getElementById('in-d').value = state.date;
        render();
    }
</script>
</body>
</html>
