<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Love Widget</title>
    <script src="https://telegram.org"></script>
    <style>
        body { margin: 0; font-family: sans-serif; background: #4a0e0e; color: white; text-align: center; }
        #bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: #4a0e0e; }
        .container { width: 90%; max-width: 400px; margin: 0 auto; padding: 50px 0; }
        
        .settings-btn { position: fixed; top: 20px; left: 20px; width: 35px; height: 35px; background: rgba(255,255,255,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 100; }
        
        .avatar-row { display: flex; justify-content: center; align-items: center; gap: 15px; margin-bottom: 20px; }
        .avatar { width: 85px; height: 85px; border-radius: 50%; border: 2px solid #fff; background-size: cover; background-position: center; background-color: rgba(255,255,255,0.1); }
        
        .card { background: rgba(255,255,255,0.1); border-radius: 25px; padding: 30px 10px; margin-bottom: 20px; }
        .days { font-size: 70px; font-weight: bold; }
        
        .item { background: rgba(255,255,255,0.1); border-radius: 15px; padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .check { width: 20px; height: 20px; background: #4caf50; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 12px; }

        /* Настройки */
        #settings { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; color: black; display: none; z-index: 1000; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
        .btn { background: #ff4d6d; color: white; border: none; padding: 15px; border-radius: 10px; width: 100%; font-weight: bold; font-size: 16px; margin-top: 10px; cursor: pointer; }
    </style>
</head>
<body>

<div id="bg"></div>
<div class="settings-btn" onclick="showSet(true)">⚙️</div>

<div class="container">
    <div class="avatar-row">
        <div id="v-p1" class="avatar" onclick="document.getElementById('f1').click()"></div>
        <div style="font-size: 25px;">❤️</div>
        <div id="v-p2" class="avatar" onclick="document.getElementById('f2').click()"></div>
    </div>
    <div class="card">
        <div id="v-names">ТЫ + ПОЛОВИНКА</div>
        <div id="v-days" class="days">0</div>
        <div>дней вместе</div>
    </div>
    <div id="v-list" style="text-align: left;"></div>
</div>

<div id="settings">
    <h2 style="margin-top: 0;">Настройки</h2>
    <input type="text" id="in-n1" placeholder="Ваше имя">
    <input type="text" id="in-n2" placeholder="Имя половинки">
    <input type="date" id="in-date">
    <label>Цвет фона:</label>
    <select id="in-color" onchange="document.getElementById('bg').style.background = this.value">
        <option value="#4a0e0e">Бордовый</option>
        <option value="#1a1a2e">Темно-синий</option>
        <option value="#000000">Черный</option>
    </select>
    <button class="btn" onclick="save()">СОХРАНИТЬ</button>
    <button class="btn" style="background:#999;" onclick="showSet(false)">Назад</button>
</div>

<input type="file" id="f1" accept="image/*" onchange="up(this, 'pic1')" style="display:none">
<input type="file" id="f2" accept="image/*" onchange="up(this, 'pic2')" style="display:none">

<script>
    let state = JSON.parse(localStorage.getItem('love_v6')) || { n1:'Ты', n2:'Половинка', date:'2024-01-01', pic1:'', pic2:'', color:'#4a0e0e' };

    function showSet(v) { document.getElementById('settings').style.display = v ? 'block' : 'none'; }

    function up(input, key) {
        const reader = new FileReader();
        reader.onload = (e) => { state[key] = e.target.result; saveToLoc(); };
        reader.readAsDataURL(input.files[0]);
    }

    function save() {
        state.n1 = document.getElementById('in-n1').value || state.n1;
        state.n2 = document.getElementById('in-n2').value || state.n2;
        state.date = document.getElementById('in-date').value || state.date;
        state.color = document.getElementById('in-color').value;
        saveToLoc();
        showSet(false);
    }

    function saveToLoc() { localStorage.setItem('love_v6', JSON.stringify(state)); render(); }

    function render() {
        document.getElementById('bg').style.background = state.color;
        document.getElementById('v-names').innerText = state.n1 + " + " + state.n2;
        const start = new Date(state.date);
        const today = new Date();
        const diff = Math.floor((today - start) / 86400000);
        document.getElementById('v-days').innerText = diff > 0 ? diff : 0;
        
        if(state.pic1) document.getElementById('v-p1').style.backgroundImage = `url(${state.pic1})`;
        if(state.pic2) document.getElementById('v-p2').style.backgroundImage = `url(${state.pic2})`;

        const list = document.getElementById('v-list');
        list.innerHTML = '<h3>Лента любви</h3>';
        
        // Этапы: 1 мес, 3 мес, 6 мес, 1 год... до 10 лет
        let milestones = [
            {n:"1 месяц ✨", m:1}, {n:"3 месяца ⚡️", m:3}, {n:"Полгода ❤️", m:6}, {n:"1 год 💎", m:12}
        ];
        for(let i=2; i<=10; i++) milestones.push({n: i + " лет 👑", m: i*12});

        milestones.forEach(ms => {
            let d = new Date(start); d.setMonth(d.getMonth() + ms.m);
            let left = Math.ceil((d - today) / 86400000);
            let past = left <= 0;
            list.innerHTML += `<div class="item" style="opacity:${past?0.5:1}">
                <span>${ms.n}</span>
                <span>${past?'<div class="check">✓</div>':left+' дн.'}</span>
            </div>`;
        });
    }

    window.onload = () => {
        document.getElementById('in-n1').value = state.n1;
        document.getElementById('in-n2').value = state.n2;
        document.getElementById('in-date').value = state.date;
        render();
    };
</script>
</body>
</html>
