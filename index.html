<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Love Premium Ultimate</title>
    <script src="https://telegram.org"></script>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --p: #ff4d6d; --glass: rgba(255, 255, 255, 0.15); }
        body { margin: 0; font-family: 'Montserrat', sans-serif; background: #000; color: white; transition: 0.5s; min-height: 100vh; overflow-x: hidden; }
        
        /* Тот самый живой фон */
        #bg-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background-size: 400% 400% !important; animation: moveBG 15s infinite; transition: 1s; }
        @keyframes moveBG { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }

        .container { width: 90%; max-width: 400px; margin: 0 auto; padding: 60px 0 30px; text-align: center; }
        .gear-btn { position: fixed; top: 20px; left: 15px; width: 42px; height: 42px; background: var(--glass); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; z-index: 100; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }

        .glass-card { background: var(--glass); backdrop-filter: blur(15px); border-radius: 30px; border: 1px solid rgba(255,255,255,0.2); padding: 30px 15px; margin-bottom: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.3); }
        .days-val { font-size: 80px; font-weight: 900; line-height: 1; margin: 10px 0; }

        .event-item { background: var(--glass); border-radius: 20px; padding: 15px 20px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .event-item.past { opacity: 0.4; filter: grayscale(0.5); }
        .event-days { font-weight: 900; color: #ffeb3b; }

        /* Меню */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; color: #333; transform: translateX(-100%); transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 1000; padding: 25px; box-sizing: border-box; overflow-y: auto; }
        .overlay.active { transform: translateX(0); }
        .sub-menu { display: none; }
        .sub-menu.active { display: block; }
        
        .menu-btn { background: #f5f5f5; padding: 18px; border-radius: 15px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; font-weight: bold; border: none; width: 100%; cursor: pointer; font-size: 16px; font-family: inherit; }
        .btn-save { background: var(--p); color: #fff; padding: 18px; border-radius: 15px; width: 100%; font-weight: 800; font-size: 16px; margin-top: 20px; box-shadow: 0 5px 15px rgba(255,77,109,0.3); }

        input, select { width: 100%; padding: 14px; margin: 10px 0; border-radius: 12px; border: 1px solid #ddd; box-sizing: border-box; font-size: 16px; font-family: inherit; }
        
        .color-dot { width: 45px; height: 45px; border-radius: 50%; display: inline-block; margin: 10px 10px 10px 0; cursor: pointer; border: 3px solid #eee; }
        .avatar { width: 85px; height: 85px; border-radius: 50%; border: 3px solid #fff; background: var(--glass) center/cover; cursor: pointer; box-shadow: 0 5px 20px rgba(0,0,0,0.3); }
        
        .del-item { display: flex; justify-content: space-between; align-items: center; background: #fff4f4; padding: 10px; border-radius: 10px; margin-bottom: 8px; border: 1px solid #ffe0e0; }
        .del-btn { background: #ff4b4b; color: white; border: none; padding: 6px 12px; border-radius: 8px; font-weight: bold; cursor: pointer; }

        .theme-dark-ui { background: #121212 !important; color: #fff !important; }
        .theme-dark-ui .menu-btn { background: #1e1e1e; color: #fff; }
        .theme-dark-ui .del-item { background: #251212; border-color: #3d1c1c; }
    </style>
</head>
<body>

<div id="bg-layer"></div>
<div class="gear-btn" onclick="openNav('main-list')">⚙️</div>

<div class="container">
    <div style="display: flex; justify-content: center; gap: 20px; margin-bottom: 25px;">
        <div id="ui-p1" class="avatar" onclick="document.getElementById('f1').click()"></div>
        <div style="font-size: 35px; animation: pulse 1.2s infinite;">❤️</div>
        <div id="ui-p2" class="avatar" onclick="document.getElementById('f2').click()"></div>
    </div>
    <div class="glass-card">
        <div id="ui-names" style="text-transform: uppercase; font-size: 14px; letter-spacing: 2px; opacity: 0.8;">МЫ ВМЕСТЕ</div>
        <div id="ui-days" class="days-val">0</div>
        <div style="opacity: 0.7;">дней</div>
    </div>
    <div id="ui-list" style="text-align: left;"></div>
</div>

<div id="set-root" class="overlay">
    <!-- ГЛАВНОЕ МЕНЮ -->
    <div id="main-list" class="sub-menu">
        <h2 style="margin-top: 0;">Настройки ✨</h2>
        <button class="menu-btn" onclick="openNav('sec-profile')">👤 Профиль пары <span>›</span></button>
        <button class="menu-btn" onclick="openNav('sec-style')">🎨 Оформление <span>›</span></button>
        <button class="menu-btn" onclick="openNav('sec-events')">🗓️ Свои события <span>›</span></button>
        <button class="btn-save" onclick="saveAll()">СОХРАНИТЬ ВСЁ</button>
        <button onclick="closeNav()" style="width:100%; border:none; background:none; margin-top:20px; color:#999; cursor:pointer;">Закрыть</button>
    </div>

    <!-- ПРОФИЛЬ -->
    <div id="sec-profile" class="sub-menu">
        <button onclick="openNav('main-list')" style="color:var(--p); border:none; background:none; font-weight:bold; margin-bottom:15px; cursor:pointer;">‹ Назад</button>
        <h3>Имена и Дата</h3>
        <input type="text" id="in-n1" placeholder="Твое имя">
        <input type="text" id="in-n2" placeholder="Имя половинки">
        <input type="date" id="in-date">
    </div>

    <!-- ОФОРМЛЕНИЕ -->
    <div id="sec-style" class="sub-menu">
        <button onclick="openNav('main-list')" style="color:var(--p); border:none; background:none; font-weight:bold; margin-bottom:15px; cursor:pointer;">‹ Назад</button>
        <h3>Фон и Тема</h3>
        <label>Готовые оттенки:</label><br>
        <div class="color-dot" style="background:#800000;" onclick="setTheme('linear-gradient(45deg, #4a0e0e, #800000)')"></div>
        <div class="color-dot" style="background:#ff4e50;" onclick="setTheme('linear-gradient(45deg, #ff4e50, #f9d423, #ff006e)')"></div>
        <div class="color-dot" style="background:#ff8c00;" onclick="setTheme('linear-gradient(45deg, #ff8c00, #ff4e50)')"></div>
        <br><label>Свой уникальный цвет:</label>
        <input type="color" id="in-custom-color" onchange="setTheme(this.value)">
        <hr style="opacity:0.2; margin: 20px 0;">
        <label>Тема меню:</label>
        <select id="in-ui">
            <option value="light">Светлая</option>
            <option value="dark">Темная</option>
        </select>
    </div>

    <!-- СОБЫТИЯ -->
    <div id="sec-events" class="sub-menu">
        <button onclick="openNav('main-list')" style="color:var(--p); border:none; background:none; font-weight:bold; margin-bottom:15px; cursor:pointer;">‹ Назад</button>
        <h3>Управление датами</h3>
        <input type="text" id="cust-n" placeholder="Название">
        <input type="date" id="cust-d">
        <button class="menu-btn" style="background:var(--p); color:#fff; justify-content:center;" onclick="addCust()">Добавить</button>
        <hr style="opacity:0.2; margin: 20px 0;">
        <div id="delete-list"></div>
    </div>
</div>

<input type="file" id="f1" accept="image/*" onchange="up(this, 'pic1')" style="display:none;">
<input type="file" id="f2" accept="image/*" onchange="up(this, 'pic2')" style="display:none;">

<script>
    let lsKey = "love_ultimate_v12";
    let state = JSON.parse(localStorage.getItem(lsKey)) || { n1:'Ты', n2:'Она', date:'2024-01-01', pic1:'', pic2:'', theme:'linear-gradient(45deg, #ff4e50, #f9d423, #ff006e, #8338ec)', ui:'light', custom:[] };

    function openNav(id) {
        document.getElementById('set-root').classList.add('active');
        document.querySelectorAll('.sub-menu').forEach(m => m.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'sec-events') renderDeleteList();
    }
    function closeNav() { document.getElementById('set-root').classList.remove('active'); }
    function setTheme(c) { state.theme = c; render(); }

    function up(input, key) {
        const r = new FileReader();
        r.onload = (e) => { state[key] = e.target.result; saveToLoc(); };
        r.readAsDataURL(input.files);
    }

    function addCust() {
        const n = document.getElementById('cust-n').value;
        const d = document.getElementById('cust-d').value;
        if(n && d) { state.custom.push({n, d}); document.getElementById('cust-n').value = ''; saveToLoc(); renderDeleteList(); }
    }

    function removeCust(i) { state.custom.splice(i, 1); saveToLoc(); renderDeleteList(); }

    function renderDeleteList() {
        const cont = document.getElementById('delete-list');
        cont.innerHTML = '<h4>Ваши даты (удаление):</h4>';
        state.custom.forEach((ev, i) => {
            cont.innerHTML += `<div class="del-item"><span>${ev.n}</span><button class="del-btn" onclick="removeCust(${i})">Удалить</button></div>`;
        });
    }

    function saveAll() {
        state.n1 = document.getElementById('in-n1').value || state.n1;
        state.n2 = document.getElementById('in-n2').value || state.n2;
        state.date = document.getElementById('in-date').value || state.date;
        state.ui = document.getElementById('in-ui').value;
        saveToLoc(); closeNav();
    }

    function saveToLoc() { localStorage.setItem(lsKey, JSON.stringify(state)); render(); }

    function getYearWord(y) {
        if (y % 10 === 1 && y % 100 !== 11) return "год";
        if (.includes(y % 10) && !.includes(y % 100)) return "года";
        return "лет";
    }

    function render() {
        document.getElementById('bg-layer').style.background = state.theme;
        document.getElementById('set-root').className = 'overlay ' + (state.ui === 'dark' ? 'theme-dark-ui' : '');
        document.getElementById('ui-names').innerText = state.n1 + " + " + state.n2;
        let start = new Date(state.date);
        let now = new Date();
        document.getElementById('ui-days').innerText = Math.floor((now - start) / 86400000);
        if(state.pic1) document.getElementById('ui-p1').style.backgroundImage = `url(${state.pic1})`;
        if(state.pic2) document.getElementById('ui-p2').style.backgroundImage = `url(${state.pic2})`;

        let list = document.getElementById('ui-list');
        list.innerHTML = '<h3>Лента событий ❤️</h3>';
        let events = [];
        for(let i=1; i<=120; i++) {
            let d = new Date(start); d.setMonth(d.getMonth() + i);
            if(i < 12) events.push({ n: i + " мес. вместе ✨", d: d });
            else if(i % 6 === 0) {
                let y = Math.floor(i/12);
                let lbl = (i % 12 === 0) ? y + " " + getYearWord(y) + " вместе 💎" : y + " г. и 6 мес. ⚡️";
                events.push({ n: lbl, d: d });
            }
        }
        state.custom.forEach(c => events.push({ n: c.n, d: new Date(c.d) }));
        events.sort((a,b) => a.d - b.d);
        events.forEach(ev => {
            let left = Math.ceil((ev.d - now) / 86400000);
            list.innerHTML += `<div class="event-item ${left <= 0 ? 'past' : ''}">
                <div class="event-name">${ev.n}</div>
                <div class="event-days">${left <= 0 ? '✅' : left + ' дн.'}</div>
            </div>`;
        });
    }

    window.onload = () => {
        document.getElementById('in-n1').value = state.n1;
        document.getElementById('in-n2').value = state.n2;
        document.getElementById('in-date').value = state.date;
        render();
    };
</script>
</body>
</html>
