<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Love Premium Widget</title>
    <script src="https://telegram.org"></script>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --p: #ff4d6d; --glass: rgba(255, 255, 255, 0.15); --shadow: 0 8px 32px rgba(0,0,0,0.3); }
        body { margin: 0; font-family: 'Montserrat', sans-serif; color: white; min-height: 100vh; overflow-x: hidden; transition: 0.3s; }
        
        #bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; transition: 1s; background-size: 400% 400% !important; animation: moveBG 15s infinite; }
        @keyframes moveBG { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }

        .container { width: 90%; max-width: 400px; margin: 0 auto; padding: 60px 0 30px; text-align: center; }
        .settings-btn { position: fixed; top: 20px; left: 20px; width: 40px; height: 40px; background: var(--glass); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 100; cursor: pointer; box-shadow: var(--shadow); }

        .glass-card { background: var(--glass); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border-radius: 30px; border: 1px solid rgba(255,255,255,0.2); padding: 30px 15px; margin-bottom: 25px; box-shadow: var(--shadow); }
        .days-val { font-size: 80px; font-weight: 900; line-height: 1; text-shadow: 0 4px 10px rgba(0,0,0,0.2); }

        .event-item { background: var(--glass); backdrop-filter: blur(5px); border-radius: 20px; padding: 16px 20px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .event-item.past { opacity: 0.4; filter: grayscale(0.8); }
        
        /* СИСТЕМА МЕНЮ */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; color: #333; transform: translateX(-100%); transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 1000; padding: 25px; box-sizing: border-box; overflow-y: auto; }
        .overlay.active { transform: translateX(0); }
        .sub-menu { display: none; }
        .sub-menu.active { display: block; }
        
        .menu-btn { background: #f5f5f5; padding: 18px; border-radius: 15px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; font-weight: 700; border: none; width: 100%; cursor: pointer; font-family: inherit; }
        .btn-save { background: var(--p); color: white; border: none; padding: 18px; border-radius: 15px; width: 100%; font-weight: 800; font-size: 16px; margin-top: 20px; box-shadow: 0 4px 15px rgba(255,77,109,0.3); }

        input, select { width: 100%; padding: 14px; margin: 10px 0; border-radius: 12px; border: 1px solid #ddd; font-size: 16px; font-family: inherit; box-sizing: border-box; }
        .color-dot { width: 40px; height: 40px; border-radius: 50%; cursor: pointer; border: 2px solid #eee; display: inline-block; margin-right: 10px; }

        .avatar { width: 90px; height: 90px; border-radius: 50%; border: 2px solid #fff; background: var(--glass) center/cover; cursor: pointer; box-shadow: var(--shadow); }
        
        /* Темы меню */
        .theme-dark-ui { background: #121212 !important; color: #fff !important; }
        .theme-dark-ui .menu-btn { background: #1e1e1e; color: #fff; }
        .theme-dark-ui input { background: #252525; border-color: #333; color: #fff; }
    </style>
</head>
<body>

<div id="bg"></div>
<div class="settings-btn" onclick="openNav('main-nav')">⚙️</div>

<div class="container">
    <div style="display: flex; justify-content: center; gap: 20px; margin-bottom: 30px;">
        <div id="v-p1" class="avatar" onclick="document.getElementById('f1').click()"></div>
        <div style="font-size: 30px; animation: pulse 1.5s infinite;">❤️</div>
        <div id="v-p2" class="avatar" onclick="document.getElementById('f2').click()"></div>
    </div>
    <div class="glass-card">
        <div id="v-names" style="text-transform: uppercase; letter-spacing: 2px; font-size: 14px; opacity: 0.8;">МЫ ВМЕСТЕ</div>
        <div id="v-days" class="days-val">0</div>
        <div style="font-size: 16px; opacity: 0.7;">дней</div>
    </div>
    <div id="v-list" style="text-align: left;"></div>
</div>

<div id="set-root" class="overlay">
    <!-- ГЛАВНОЕ -->
    <div id="main-nav" class="sub-menu active">
        <h2 style="margin-top: 0;">Настройки ✨</h2>
        <button class="menu-btn" onclick="openNav('profile-set')">👤 Профиль пары <span>›</span></button>
        <button class="menu-btn" onclick="openNav('style-set')">🎨 Оформление и Темы <span>›</span></button>
        <button class="menu-btn" onclick="openNav('events-set')">🗓️ Важные события <span>›</span></button>
        <button class="btn-save" onclick="saveAll()">СОХРАНИТЬ</button>
        <button onclick="closeNav()" style="width:100%; border:none; background:none; margin-top:20px; color:#aaa;">Закрыть</button>
    </div>

    <!-- ПРОФИЛЬ -->
    <div id="profile-set" class="sub-menu">
        <button onclick="openNav('main-nav')" style="border:none; background:none; color:var(--p); font-weight:700; margin-bottom:15px;">‹ Назад</button>
        <h3>Профиль</h3>
        <input type="text" id="in-n1" placeholder="Ваше имя">
        <input type="text" id="in-n2" placeholder="Имя половинки">
        <input type="date" id="in-date">
    </div>

    <!-- ОФОРМЛЕНИЕ -->
    <div id="style-set" class="sub-menu">
        <button onclick="openNav('main-nav')" style="border:none; background:none; color:var(--p); font-weight:700; margin-bottom:15px;">‹ Назад</button>
        <h3>Фон и Тема</h3>
        <label>Выберите пресет:</label><br>
        <div style="margin: 10px 0;">
            <div class="color-dot" style="background: linear-gradient(45deg, #ff4e50, #f9d423);" onclick="setBG('linear-gradient(45deg, #ff4e50, #f9d423, #ff006e, #8338ec)')"></div>
            <div class="color-dot" style="background: linear-gradient(45deg, #1a1a2e, #16213e);" onclick="setBG('linear-gradient(45deg, #1a1a2e, #16213e, #0f3460, #1a1a2e)')"></div>
            <div class="color-dot" style="background: linear-gradient(45deg, #11998e, #38ef7d);" onclick="setBG('linear-gradient(45deg, #11998e, #38ef7d, #11998e, #38ef7d)')"></div>
        </div>
        <label>Свой цвет фона:</label>
        <input type="color" id="in-color" onchange="setBG(this.value)">
        <label>Тема меню:</label>
        <select id="in-ui">
            <option value="light">Светлая</option>
            <option value="dark">Темная</option>
        </select>
    </div>

    <!-- СОБЫТИЯ -->
    <div id="events-set" class="sub-menu">
        <button onclick="openNav('main-nav')" style="border:none; background:none; color:var(--p); font-weight:700; margin-bottom:15px;">‹ Назад</button>
        <h3>Добавить дату</h3>
        <input type="text" id="cust-n" placeholder="Название (напр. Первый поцелуй)">
        <input type="date" id="cust-d">
        <button class="menu-btn" style="background:var(--p); color:#fff; justify-content:center;" onclick="addCust()">Добавить в ленту</button>
    </div>
</div>

<input type="file" id="f1" accept="image/*" onchange="upPhoto(this, 'pic1')" style="display:none;">
<input type="file" id="f2" accept="image/*" onchange="upPhoto(this, 'pic2')" style="display:none;">

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    let state = JSON.parse(localStorage.getItem('love_final_v10')) || {
        n1: 'Ты', n2: 'Половинка', date: '2024-01-01',
        pic1: '', pic2: '', theme: 'linear-gradient(45deg, #ff4e50, #f9d423, #ff006e, #8338ec)', ui: 'light', custom: []
    };

    function openNav(id) {
        document.getElementById('set-root').classList.add('active');
        document.querySelectorAll('.sub-menu').forEach(m => m.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }
    function closeNav() { document.getElementById('set-root').classList.remove('active'); }
    function setBG(c) { state.theme = c; render(); }

    function upPhoto(input, key) {
        if (input.files && input.files) {
            const reader = new FileReader();
            reader.onload = (e) => { state[key] = e.target.result; render(); localStorage.setItem('love_final_v10', JSON.stringify(state)); };
            reader.readAsDataURL(input.files);
        }
    }

    function addCust() {
        const n = document.getElementById('cust-n').value;
        const d = document.getElementById('cust-d').value;
        if(n && d) { state.custom.push({n, d}); document.getElementById('cust-n').value = ''; render(); alert("Событие добавлено!"); }
    }

    function saveAll() {
        state.n1 = document.getElementById('in-n1').value || state.n1;
        state.n2 = document.getElementById('in-n2').value || state.n2;
        state.date = document.getElementById('in-date').value || state.date;
        state.ui = document.getElementById('in-ui').value;
        localStorage.setItem('love_final_v10', JSON.stringify(state));
        render(); closeNav();
    }

    function getYearWord(y) {
        if (y % 10 === 1 && y % 100 !== 11) return "год";
        if ([2, 3, 4].includes(y % 10) && ![12, 13, 14].includes(y % 100)) return "года";
        return "лет";
    }

    function render() {
        document.getElementById('bg').style.background = state.theme;
        document.getElementById('set-root').className = 'overlay ' + (state.ui === 'dark' ? 'theme-dark-ui' : '');
        document.getElementById('v-names').innerText = `${state.n1} + ${state.n2}`;
        const start = new Date(state.date);
        const today = new Date();
        document.getElementById('v-days').innerText = Math.floor((today - start) / 86400000);

        if(state.pic1) document.getElementById('v-p1').style.backgroundImage = `url(${state.pic1})`;
        if(state.pic2) document.getElementById('v-p2').style.backgroundImage = `url(${state.pic2})`;

        const list = document.getElementById('v-list');
        list.innerHTML = '<h3>Лента времени ❤️</h3>';

        let evs = [];
        // Генерируем подробные вехи на 10 лет
        for(let i=1; i<=120; i++) {
            let d = new Date(start); d.setMonth(d.getMonth() + i);
            if(i < 12) evs.push({n: `${i} мес. вместе ✨`, d: new Date(d)});
            else if(i % 3 === 0) {
                let y = Math.floor(i/12);
                let m = i % 12;
                let label = m === 0 ? `${y} ${getYearWord(y)} вместе 💎` : `${y} г. и ${m} мес. ⚡️`;
                evs.push({n: label, d: new Date(d)});
            }
        }
        state.custom.forEach(c => evs.push({n: c.n, d: new Date(c.d)}));
        evs.sort((a,b) => a.d - b.d).forEach(ev => {
            const left = Math.ceil((ev.d - today) / 86400000);
            list.innerHTML += `<div class="event-item ${left <= 0 ? 'past' : ''}">
                <div style="font-size:13px;">${ev.n}</div>
                <div style="font-weight:800; color:#ffeb3b;">${left <= 0 ? '✅' : left + ' дн.'}</div>
            </div>`;
        });
    }

    window.onload = () => {
        document.getElementById('in-n1').value = state.n1;
        document.getElementById('in-n2').value = state.n2;
        document.getElementById('in-date').value = state.date;
        document.getElementById('in-ui').value = state.ui;
        render();
    };
</script>
</body>
</html>
