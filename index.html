<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Love Timeline Pro</title>
    <script src="https://telegram.org"></script>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --p: #ff4d6d; --glass: rgba(255, 255, 255, 0.1); --text: #fff; }
        body { margin: 0; font-family: 'Montserrat', sans-serif; color: var(--text); transition: 0.5s; min-height: 100vh; overflow-x: hidden; }
        
        /* Фон */
        #bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background-size: 400% 400%; animation: move 15s infinite; }
        @keyframes move { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }

        .container { width: 90%; max-width: 400px; margin: 0 auto; padding: 60px 0 30px; text-align: center; }
        
        /* Кнопка настроек в углу */
        .settings-trigger { position: fixed; top: 15px; left: 15px; background: var(--glass); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); width: 45px; height: 45px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; z-index: 100; cursor: pointer; }

        /* Карточка */
        .glass-card { background: var(--glass); backdrop-filter: blur(15px); border-radius: 30px; border: 1px solid rgba(255,255,255,0.1); padding: 30px 15px; margin-bottom: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); }
        .days-val { font-size: 80px; font-weight: 900; line-height: 1; margin: 10px 0; }

        /* Таймлайн */
        .timeline { text-align: left; }
        .event-item { background: var(--glass); border-radius: 20px; padding: 15px 20px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(255,255,255,0.05); }
        .event-item.past { opacity: 0.4; filter: grayscale(1); }
        .event-name { font-weight: 600; font-size: 14px; }
        .event-days { font-weight: 800; font-size: 13px; color: #ffeb3b; }

        /* Панель настроек */
        #settings { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; color: #000; transform: translateX(-100%); transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 1000; padding: 25px; box-sizing: border-box; overflow-y: auto; }
        #settings.active { transform: translateX(0); }
        .theme-dark { background: #1a1a2e !important; color: #fff !important; }
        
        input, select { width: 100%; padding: 14px; margin: 10px 0; border-radius: 12px; border: 1px solid #ddd; box-sizing: border-box; font-size: 16px; font-family: inherit; }
        .btn { background: var(--p); color: #fff; padding: 16px; border: none; border-radius: 15px; width: 100%; font-weight: 700; cursor: pointer; margin-top: 10px; box-shadow: 0 5px 15px rgba(255,77,109,0.3); }
        .btn-add { background: #4caf50; box-shadow: 0 5px 15px rgba(76,175,80,0.3); }

        .photo-row { display: flex; justify-content: center; gap: 15px; margin-bottom: 20px; }
        .avatar { width: 80px; height: 80px; border-radius: 50%; border: 3px solid #fff; background: rgba(255,255,255,0.2) center/cover; cursor: pointer; }
    </style>
</head>
<body>

<div id="bg"></div>
<div class="settings-trigger" onclick="toggleSet(true)">⚙️</div>

<div class="container">
    <div class="photo-row">
        <div id="v-p1" class="avatar" onclick="document.getElementById('f1').click()"></div>
        <div style="font-size: 30px; animation: beat 1s infinite;">❤️</div>
        <div id="v-p2" class="avatar" onclick="document.getElementById('f2').click()"></div>
    </div>

    <div class="glass-card">
        <div id="v-names" style="font-size: 14px; letter-spacing: 2px; opacity: 0.8;">МЫ ВМЕСТЕ</div>
        <div id="v-days" class="days-val">0</div>
        <div style="font-size: 16px; opacity: 0.7;">дней</div>
    </div>

    <div class="timeline" id="v-list"></div>
</div>

<div id="settings">
    <h2 style="margin-top: 0;">Параметры ❤️</h2>
    
    <label>Имена и Дата:</label>
    <input type="text" id="in-n1" placeholder="Ваше имя">
    <input type="text" id="in-n2" placeholder="Имя половинки">
    <input type="date" id="in-date">

    <label>Тема оформления:</label>
    <select id="in-theme" onchange="applyPreview()">
        <option value="linear-gradient(45deg, #ff4e50, #f9d423)">Закат (Розовый)</option>
        <option value="linear-gradient(45deg, #1a1a2e, #16213e, #0f3460)">Ночь (Синий)</option>
        <option value="linear-gradient(45deg, #00b09b, #96c93d)">Природа (Зеленый)</option>
        <option value="linear-gradient(45deg, #8e2de2, #4a00e0)">Космос (Фиолетовый)</option>
        <option value="dark">Темная тема</option>
        <option value="light">Светлая тема</option>
    </select>

    <div style="background: #fdf2f4; padding: 15px; border-radius: 15px; margin: 15px 0;">
        <b style="color: var(--p)">Добавить своё событие:</b>
        <input type="text" id="cust-n" placeholder="Название (напр. Первый поцелуй)">
        <input type="date" id="cust-d">
        <button class="btn btn-add" onclick="addCustom()">Добавить в ленту</button>
    </div>

    <button class="btn" onclick="saveAll()">СОХРАНИТЬ ВСЁ</button>
    <button class="btn" style="background:#999; box-shadow:none;" onclick="toggleSet(false)">ЗАКРЫТЬ</button>
</div>

<input type="file" id="f1" accept="image/*" onchange="upPhoto(this, 'pic1')">
<input type="file" id="f2" accept="image/*" onchange="upPhoto(this, 'pic2')">

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    let state = JSON.parse(localStorage.getItem('love_pro_v20')) || {
        n1: 'Ты', n2: 'Половинка', date: '2024-01-01',
        pic1: '', pic2: '', theme: 'linear-gradient(45deg, #ff4e50, #f9d423)', custom: []
    };

    function toggleSet(val) { document.getElementById('settings').classList.toggle('active', val); }

    function upPhoto(input, key) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => { state[key] = e.target.result; save(); };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function addCustom() {
        const name = document.getElementById('cust-n').value;
        const date = document.getElementById('cust-d').value;
        if(name && date) {
            state.custom.push({ name, date });
            document.getElementById('cust-n').value = '';
            document.getElementById('cust-d').value = '';
            save();
            alert("Дата добавлена и отсортирована!");
        }
    }

    function saveAll() {
        state.n1 = document.getElementById('in-n1').value || state.n1;
        state.n2 = document.getElementById('in-n2').value || state.n2;
        state.date = document.getElementById('in-date').value || state.date;
        state.theme = document.getElementById('in-theme').value;
        save();
        toggleSet(false);
    }

    function save() {
        localStorage.setItem('love_pro_v20', JSON.stringify(state));
        render();
    }

    function render() {
        // Тема
        const bg = document.getElementById('bg');
        if(state.theme === 'dark') { document.body.className = 'theme-dark'; bg.style.background = '#1a1a2e'; }
        else if(state.theme === 'light') { document.body.className = ''; document.body.style.color = '#000'; bg.style.background = '#f5f5f5'; }
        else { document.body.className = ''; bg.style.background = state.theme; }

        document.getElementById('v-names').innerText = `${state.n1} + ${state.n2}`;
        const start = new Date(state.date);
        const today = new Date();
        const diff = Math.floor((today - start) / 86400000);
        document.getElementById('v-days').innerText = diff > 0 ? diff : 0;

        if(state.pic1) document.getElementById('v-p1').style.backgroundImage = `url(${state.pic1})`;
        if(state.pic2) document.getElementById('v-p2').style.backgroundImage = `url(${state.pic2})`;

        // ГЕНЕРАЦИЯ ЛЕНТЫ
        const list = document.getElementById('v-list');
        list.innerHTML = '<h3 style="margin: 20px 0 10px;">Лента времени ❤️</h3>';

        let allEvents = [];

        // 1. Генерируем вехи (10 лет)
        // Месяцы
        for(let m of [1, 3, 6, 9]) {
            let d = new Date(start); d.setMonth(d.getMonth() + m);
            allEvents.push({ name: `${m} месяцев ✨`, date: d });
        }
        // Годы (до 10 лет)
        for(let y = 1; y <= 10; y++) {
            let d = new Date(start); d.setFullYear(d.getFullYear() + y);
            allEvents.push({ name: `${y} год вместе 💎`, date: d });
        }
        // Красивые числа дней
        for(let d_count of [100, 500, 1000, 1500, 2000, 3000]) {
            let d = new Date(start); d.setDate(d.getDate() + d_count);
            allEvents.push({ name: `${d_count} дней! 🔥`, date: d });
        }

        // 2. Добавляем свои события
        state.custom.forEach(c => allEvents.push({ name: c.name, date: new Date(c.date) }));

        // 3. СОРТИРОВКА (Самое важное!)
        allEvents.sort((a, b) => a.date - b.date);

        // 4. Отрисовка
        allEvents.forEach(ev => {
            const left = Math.ceil((ev.date - today) / 86400000);
            const isPast = left <= 0;
            list.innerHTML += `
                <div class="event-item ${isPast ? 'past' : ''}">
                    <div class="event-name">${ev.name}</div>
                    <div class="event-days">${isPast ? 'Пройдено ✅' : left + ' дн.'}</div>
                </div>`;
        });
    }

    window.onload = () => {
        document.getElementById('in-n1').value = state.n1;
        document.getElementById('in-n2').value = state.n2;
        document.getElementById('in-date').value = state.date;
        document.getElementById('in-theme').value = state.theme;
        render();
    };
</script>
</body>
</html>
